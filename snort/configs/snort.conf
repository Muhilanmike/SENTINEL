# Sentinel AI-IDS - Snort Configuration

# Network variables
ipvar HOME_NET any
ipvar EXTERNAL_NET !$HOME_NET

# Port variables
portvar HTTP_PORTS [80,8080,8443]
portvar SSH_PORTS 22
portvar FTP_PORTS 21
portvar DNS_PORTS 53

# Paths
var RULE_PATH ./snort/rules
var LOG_PATH ./data/logs

# Decoder settings
config disable_decode_alerts
config disable_tcpopt_experimental_alerts
config disable_tcpopt_obsolete_alerts
config disable_tcpopt_ttcp_alerts
config disable_ttcp_alerts

# Detection engine
config detection: search-method ac-split
config event_queue: max_queue 8 log 3 order_events content_length

# Output settings
output alert_fast: snort_alerts.log
output log_tcpdump: snort_capture.pcap

# Preprocessors
preprocessor frag3_global: max_frags 65536
preprocessor frag3_engine: policy windows detect_anomalies

preprocessor stream5_global: \
    track_tcp yes, \
    track_udp yes, \
    track_icmp yes, \
    max_tcp 262144, \
    max_udp 131072, \
    max_icmp 65536

preprocessor stream5_tcp: \
    policy windows, \
    detect_anomalies, \
    require_3whs 180, \
    overlap_limit 10, \
    small_segments 3 bytes 150, \
    timeout 180

preprocessor http_inspect: \
    global iis_unicode_map unicode.map 1252 \
    compress_depth 65535 \
    decompress_depth 65535

preprocessor http_inspect_server: \
    server default \
    http_methods { GET POST PUT HEAD DELETE TRACE OPTIONS } \
    chunk_length 500000 \
    server_flow_depth 0 \
    client_flow_depth 0 \
    post_depth 65495 \
    oversize_dir_length 500 \
    max_header_length 750 \
    max_headers 100

# Include local rules
include $RULE_PATH/local.rules
